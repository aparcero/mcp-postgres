services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "55432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mcp_postgres_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mcp_postgres_test"]
      interval: 2s
      timeout: 2s
      retries: 30
